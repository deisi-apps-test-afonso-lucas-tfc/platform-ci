namespace: deisi

app:
  name: app

replicaCount: 1

image:
  repository: ghcr.io/repository-owner/repository-name
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-secret

service:
  name: app
  type: NodePort
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  name: app
  className: traefik
  host: app.134.122.74.17.nip.io
  path: /
  pathType: Prefix

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

env:
  APP_ENV: "production"