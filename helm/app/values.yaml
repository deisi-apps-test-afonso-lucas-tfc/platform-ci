namespace: default
app:
  name: app
  imagePullSecrets:
    - name: ghcr-secret

replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000 

persistence:
  enabled: true
  path: "/data"  
  size: "1Gi"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  NODE_ENV: "production"

ingress:
  enabled: true
  name: ""
  className: "nginx"
  path: "/"
  pathType: "Prefix"
  host: ""